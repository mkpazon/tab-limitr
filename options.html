<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 300px;
      margin: 0;
      padding: 16px;
    }
    h1 {
      color: #333;
      margin: 0 0 16px 0;
      font-size: 18px;
    }
    .setting-group {
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }
    input[type="number"] {
      width: 100px;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    .help-text {
      font-size: 13px;
      color: #777;
      margin-top: 4px;
    }
    button {
      background: #1976d2;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      margin-right: 8px;
    }
    button:hover {
      background: #1565c0;
    }
    .success-message {
      color: #2e7d32;
      margin-top: 16px;
      display: none;
    }
    .error-message {
      color: #c62828;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Tab Limitr Settings</h1>

  <div class="setting-group">
    <label for="tabLimit">Maximum tabs per window:</label>
    <input type="number" id="tabLimit" min="1" max="100" value="10">
    <div class="help-text">Set the maximum number of tabs allowed in each window (1-100)</div>
  </div>

  <button id="saveBtn">Save Settings</button>
  <button id="resetBtn">Reset to Default</button>

  <div id="successMessage" class="success-message">Settings saved successfully!</div>
  <div id="errorMessage" class="error-message">Please enter a valid number between 1 and 100.</div>

  <script src="options.js"></script>
</body>
</html>
